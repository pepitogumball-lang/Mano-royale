name: Build .mcaddon

on:
  push:
    branches: [main, develop]
    paths:
      - 'behavior_pack/**'
      - 'resource_pack/**'
      - 'scripts/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pngjs (for textures)
        run: npm install --no-save pngjs

      - name: Generate textures (pack icons + items)
        run: node scripts/gen_textures.js

      - name: Validate JSON manifests
        run: |
          set -e
          for f in $(find behavior_pack resource_pack -name '*.json'); do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" \
              || (echo "INVALID JSON: $f" && exit 1)
          done
          echo "All JSON valid."

      - name: Build packs (.mcpack) and combined .mcaddon
        run: |
          set -e
          mkdir -p build
          (cd behavior_pack && zip -qr "../build/mano-royale-BP.mcpack" .)
          (cd resource_pack && zip -qr "../build/mano-royale-RP.mcpack" .)
          rm -rf build/_addon && mkdir -p build/_addon
          cp -r behavior_pack build/_addon/behavior_pack
          cp -r resource_pack build/_addon/resource_pack
          (cd build/_addon && zip -qr "../mano-royale.mcaddon" behavior_pack resource_pack)
          rm -rf build/_addon
          ls -lh build/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mano-royale-mcaddon
          path: |
            build/mano-royale.mcaddon
            build/mano-royale-BP.mcpack
            build/mano-royale-RP.mcpack
          retention-days: 90

      - name: Attach to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/mano-royale.mcaddon
            build/mano-royale-BP.mcpack
            build/mano-royale-RP.mcpack
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
